name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

# 防止多个 PR 同时跑测试时资源冲突
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/zhiyu-be

jobs:
  # ============================================================
  # 1. 集成测试（docker compose）
  # ============================================================
  test:
    name: Integration Test (docker compose)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create secrets directory
        # secrets/ 目录被 .gitignore 排除，CI 中需要预创建
        # 同时生成一对占位 RSA 密钥（CI 不会校验 JWT 签名）
        run: |
          mkdir -p secrets/keys
          ssh-keygen -t rsa -b 2048 -f secrets/keys/private.pem -N "" -q
          ssh-keygen -t rsa -b 2048 -f secrets/keys/public.pem -N "" -q
          chmod 600 secrets/keys/*

      # 用项目自带的 docker-compose.yml 起 mysql + backend
      # CI 专用 .env 注入（覆盖默认密码）
      - name: Create CI .env
        run: |
          cat > .env <<'EOF'
          MYSQL_ROOT_PASSWORD=testpass
          MYSQL_DATABASE=zhiguang_test
          MYSQL_PORT=3307
          REDIS_PORT=6380
          KAFKA_PORT=9093
          ES_PORT=9201
          BACKEND_PORT=8081
          DEEPSEEK_API_KEY=ci-fake-key
          QWEN_API_KEY=ci-fake-key
          OSS_ENDPOINT=oss-cn-beijing.aliyuncs.com
          OSS_ACCESS_KEY_ID=ci-fake
          OSS_ACCESS_KEY_SECRET=ci-fake
          OSS_BUCKET=ci-bucket
          MAIL_HOST=smtp.qq.com
          MAIL_USERNAME=ci@qq.com
          MAIL_PASSWORD=ci-fake
          EOF

      - name: Build backend image
        run: docker compose build backend

      - name: Start MySQL only (CI 优化：跳过 Redis/Kafka/ES)
        run: docker compose up -d mysql
        env:
          COMPOSE_FILE: docker-compose.yml
          BACKEND_PORT: "8081"
          # 用 CI override file 跳过其他中间件
      - name: Wait for MySQL healthy
        run: |
          for i in {1..30}; do
            docker compose exec -T mysql mysqladmin ping -h localhost -ptestpass --silent && exit 0
            echo "Waiting for MySQL... ($i)"
            sleep 2
          done
          echo "MySQL not ready"
          docker compose logs mysql
          exit 1

      - name: Run Flyway migration via backend startup
        # 启动 backend，Spring Boot 启动时 Flyway 自动跑 V1__init_schema.sql
        # 验证：1) Spring 上下文 OK 2) Flyway migration 无语法错 3) DB schema 正确
        run: |
          docker compose up -d backend
          echo "Waiting for backend to be healthy..."
          for i in {1..40}; do
            curl -fs http://localhost:8081/actuator/health | grep -q '"status":"UP"' && exit 0
            sleep 3
          done
          echo "Backend unhealthy"
          docker compose logs backend
          exit 1

      - name: Verify Flyway schema_history
        run: |
          docker compose exec -T mysql mysql -uroot -ptestpass zhiguang_test \
            -e "SELECT version, description, success FROM flyway_schema_history ORDER BY installed_rank;"

      - name: Verify critical tables exist
        run: |
          docker compose exec -T mysql mysql -uroot -ptestpass zhiguang_test \
            -e "SHOW TABLES;" | grep -E "users|login_logs|knowposts" || (echo "Missing critical tables"; exit 1)

      - name: Run smoke tests on key APIs
        run: |
          # 首页 feed（公开 API）
          curl -fs "http://localhost:8081/api/v1/knowposts/feed?page=1&size=5" | head -c 200
          echo ""
          echo "✅ API smoke test passed"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: |
            .docker-compose.log
            backend.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v
          rm -f .env

  # ============================================================
  # 2. 构建并推送 Docker 镜像到 GHCR
  # ============================================================
  build:
    name: Build & Push Image (GHCR)
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write   # 推送 GHCR 需要

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # main 分支 → main tag
            type=raw,value=main,enable={{is_default_branch}}
            # git tag → v1.2.3 / v1.2 / v1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # PR 自动加 sha-<short>
            type=sha,prefix=sha-

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 多架构（amd64 + arm64）— Mac M1 / Linux x86 都跑
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # 3. 部署到生产 ECS（仅 main 分支 push 触发）
  # ============================================================
  deploy:
    name: Deploy to ECS
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://zhiyu-36a.pages.dev

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            echo "📥 拉取最新镜像..."
            cd /opt/moehair-backend

            # 拉取 main tag 镜像（CI 推送的）
            docker compose pull backend

            echo "🔄 滚动重启 backend（其他服务不重启）..."
            docker compose up -d --no-deps --force-recreate backend

            echo "⏳ 等待 backend healthy..."
            for i in {1..40}; do
              if docker compose exec -T backend wget -qO- http://127.0.0.1:8080/actuator/health 2>/dev/null | grep -q '"status":"UP"'; then
                echo "✅ Backend healthy after ${i} attempts"
                exit 0
              fi
              sleep 3
            done

            echo "❌ Backend unhealthy, rolling back..."
            docker compose logs --tail=100 backend
            exit 1

      - name: Notify success
        if: success()
        run: |
          echo "🚀 Deploy succeeded at $(date -u)"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deploy failed at $(date -u)"
          echo "Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
