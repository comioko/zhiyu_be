# 知域后端 - 生产环境配置
#
# 用法：jar 启动时通过 systemd EnvironmentFile 注入环境变量
# 所有敏感字段（密码、密钥、API key）都从环境变量读取
# 启动命令示例：
#   java -jar /opt/moehair-backend/zhiyu-1.0-SNAPSHOT.jar \
#     --spring.profiles.active=prod

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: zhiyu

  # ===== 数据源 =====
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/zhiguang?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ===== Flyway 数据库迁移（启动时自动执行） =====
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    baseline-version: 0
    validate-on-migrate: true    # 生产开启 checksum 校验，防止手动改库

  # ===== Redis =====
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  # ===== 邮件（QQ 邮箱 SMTP） =====
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  # ===== Kafka =====
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    template:
      default-topic: current-events
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      linger: 10ms
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: counter-agg
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
      enable-auto-commit: false
    listener:
      type: single
      ack-mode: manual
      auto-startup: ${KAFKA_LISTENER_AUTO_STARTUP:false}

  # ===== Spring AI（DeepSeek + 通义千问 Embedding） =====
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: deepseek-chat
          temperature: 0.8
    openai:
      base-url: ${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      api-key: ${QWEN_API_KEY}
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 1536
    vectorstore:
      elasticsearch:
        initialize-schema: true
        index-name: zhiyu-ai-index
        dimensions: 1536

  # ===== Elasticsearch =====
  elasticsearch:
    uris: ${ES_URIS:http://127.0.0.1:9200}
    username: ${ES_USERNAME:elastic}
    password: ${ES_PASSWORD}

# ===== MyBatis =====
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.comioko.*.domain
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# ===== 阿里云 OSS =====
oss:
  endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
  access-key-id: ${OSS_ACCESS_KEY_ID}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET}
  bucket: ${OSS_BUCKET:comioko-zhg}
  public-domain: ${OSS_PUBLIC_DOMAIN:}
  folder: avatars

# ===== JWT 认证 =====
auth:
  jwt:
    # 私钥/公钥文件路径（用文件方式，避免密钥进 env）
    private-key: file:/opt/moehair-backend/keys/private.pem
    public-key: file:/opt/moehair-backend/keys/public.pem
    access-token-ttl: 15m
    refresh-token-ttl: 7d

# ===== Actuator 健康检查 =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never    # 生产关闭详情
      probes:
        enabled: true

# ===== 日志 =====
logging:
  level:
    root: INFO
    com.comioko: INFO
    org.springframework.web: INFO
    org.mybatis: WARN
  file:
    name: /var/log/moehair-backend/app.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30

# ===== Canal（binlog 订阅，关闭） =====
canal:
  enabled: ${CANAL_ENABLED:false}
  host: ${CANAL_HOST:127.0.0.1}
  port: ${CANAL_PORT:11111}
  destination: ${CANAL_DESTINATION:example}
  username: ${CANAL_USERNAME:canal}
  password: ${CANAL_PASSWORD}
  filter: zhiyu\.outbox
  batchSize: 1000
  intervalMs: 1000
